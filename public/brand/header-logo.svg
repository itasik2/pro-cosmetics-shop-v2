<svg viewBox="0 0 1600 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="proGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6"
        flood-color="#000000"
        flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- PRO -->
  <text x="40%" y="230"
        text-anchor="end"
        font-family="Cinzel, serif"
        font-size="220"
        fill="url(#proGradient)"
        filter="url(#shadow)">
    PRO
  </text>

  <!-- COSMETICS -->
  <text x="42%" y="230"
        text-anchor="start"
        font-family="Cinzel, serif"
        font-size="70"
        letter-spacing="10"
        fill="#111">
    COSMETICS
  </text>

</svg>
